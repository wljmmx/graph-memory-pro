name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2.2.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: Verify (tsc + build + test)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          CI: "true"

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF##*/}"
          if [ -z "$TAG" ] || [ "$TAG" = "${GITHUB_REF}" ]; then
            TAG="${{ inputs.tag }}"
          fi
          # strip leading 'v'
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing version=$VERSION tag=$TAG"

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi
          echo "Version match: $PKG_VERSION"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    name: GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: ${{ github.ref_name || inputs.tag }}
          generate_release_notes: true
          body: |
            ## Graph Memory Pro ${{ github.ref_name || inputs.tag }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.

            ### Verification
            - ✅ tsc --noEmit (0 errors)
            - ✅ npm run build (success)
            - ✅ npm test (334/334 passed)

            ### Audit Report
            See [AUDIT_REPORT.md](https://github.com/${{ github.repository }}/blob/main/AUDIT_REPORT.md)
          files: |
            dist/
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    # 仅在有 NPM_TOKEN 时发布；未配置则跳过
    if: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
